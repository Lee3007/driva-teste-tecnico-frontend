services:
  - type: web
    name: market-intelligence-api
    runtime: node
    region: oregon
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @market/backend build
    startCommand: npx pnpm --filter @market/backend start
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production

  - type: web
    name: market-intelligence-app
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @market/frontend build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://market-intelligence-api.onrender.com
